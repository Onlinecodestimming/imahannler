<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — BipCasino</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="center-title-row">
  <h1 style="margin:0;">Log in</h1>
</div>

<div class="page-wrap">
  <div class="card">
    <label for="user">Username</label>
    <input id="user" placeholder="Your username" autocomplete="username">

    <label for="pass">Password</label>
    <input id="pass" placeholder="Your password" type="password" autocomplete="current-password">

    <button id="loginBtn" onclick="doLogin()" style="width:100%; margin-top:14px;">Log in</button>
    <p id="status" class="error-msg"></p>
    <p class="muted">No account yet? <a href="/signup.html" style="color: var(--violet);">Sign up</a></p>
  </div>
</div>

<div id="nav"></div>

<script src="/script.js"></script>
<script>
  redirectIfLoggedIn();
  loadNav();

  async function doLogin() {
    const btn = document.getElementById("loginBtn");
    const status = document.getElementById("status");
    if (!user.value || !pass.value) {
      status.innerText = "Enter a username and password.";
      return;
    }
    btn.disabled = true;
    btn.innerText = "Logging in…";
    const data = await login(user.value.trim(), pass.value);
    if (data.error) {
      status.innerText = data.error;
      btn.disabled = false;
      btn.innerText = "Log in";
      return;
    }
    status.className = "success-msg";
    status.innerText = "Logged in! Redirecting…";
    window.location.href = "/index.html";
  }

  document.getElementById("pass").addEventListener("keydown", (e) => {
    if (e.key === "Enter") doLogin();
  });
</script>
</body>
</html>
