<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../style.css">
  <style>
    .lane-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .lane {
      width: 80px;
      height: 160px;
      background: #111;
      border-radius: 14px;
      border: 1px solid rgba(255,215,0,0.3);
      position: relative;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .lane:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 16px rgba(255,215,0,0.4);
    }
    .chicken {
      width: 40px;
      height: 40px;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      text-align: center;
    }
    .car {
      width: 40px;
      height: 40px;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Chicken Game</h1>

<div class="card" style="text-align:center;">
  <h3>Bet Amount</h3>
  <input id="betAmount" type="number" value="10" style="width:120px; text-align:center;">
  <div style="margin-top:10px;">
    <button onclick="setBet(10)">+10</button>
    <button onclick="setBet(50)">+50</button>
    <button onclick="setBet(100)">+100</button>
    <button onclick="setBet('max')">MAX</button>
  </div>
</div>

<div class="lane-container">
  <div class="lane" onclick="pickLane(0)">
    <div class="car">🚗</div>
    <div class="chicken">🐔</div>
  </div>
  <div class="lane" onclick="pickLane(1)">
    <div class="car">🚗</div>
    <div class="chicken">🐔</div>
  </div>
  <div class="lane" onclick="pickLane(2)">
    <div class="car">🚗</div>
    <div class="chicken">🐔</div>
  </div>
</div>

<p id="result" style="text-align:center; margin-top:20px;"></p>

<script src="../script.js"></script>
<script>
requireLogin();

async function setBet(amount) {
  if (amount === 'max') {
    const me = await getMe();
    betAmount.value = me.tokens;
  } else {
    betAmount.value = Number(betAmount.value) + amount;
  }
}

async function pickLane(choice) {
  const safeLane = Math.floor(Math.random() * 3);
  const bet = Number(betAmount.value);

  if (choice === safeLane) {
    const mult = 2; // 2x win
    const delta = Math.round(bet * mult) - bet;
    const data = await applyGameDelta(delta);
    result.innerText = `You crossed safely! (Tokens: ${data.tokens})`;
  } else {
    const data = await applyGameDelta(-bet);
    result.innerText = `You got hit 💥 (Tokens: ${data.tokens})`;
  }
}
</script>

<div id="nav"></div>
<script>
loadNav("../nav.html");
</script>

</body>
</html>
