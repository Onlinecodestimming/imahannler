<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice — BipCasino</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="tokenBox">Loading…</div>

<h1>Dice</h1>
<p class="subtitle">Bet 10 tokens &middot; over/under pays 2x &middot; exact number pays 5x</p>

<div class="page-wrap">
  <div class="card">
    <div class="die" id="die">?</div>
    <p class="result-banner" id="result"></p>

    <label>Guess type</label>
    <div class="bet-row">
      <button class="secondary" id="underBtn" onclick="roll('under')">Under (1-3)</button>
      <button class="secondary" id="overBtn" onclick="roll('over')">Over (4-6)</button>
    </div>

    <label for="exactPick">Or pick an exact number (5x payout)</label>
    <select id="exactPick">
      <option value="">— choose a number —</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
    </select>
    <button id="exactBtn" onclick="rollExact()" style="width:100%; margin-top:6px;">Bet exact (10 tokens)</button>
  </div>
</div>

<div id="nav"></div>

<script src="../script.js"></script>
<script>
  (async () => {
    await requireLogin();
    await renderTokenBox();
    await loadNav("../nav.html");
  })();

  let rolling = false;

  function setDisabled(state) {
    document.getElementById("underBtn").disabled = state;
    document.getElementById("overBtn").disabled = state;
    document.getElementById("exactBtn").disabled = state;
  }

  async function roll(guess) {
    await doRoll(guess);
  }

  async function rollExact() {
    const val = document.getElementById("exactPick").value;
    if (!val) {
      document.getElementById("result").className = "result-banner lose";
      document.getElementById("result").innerText = "Pick a number first.";
      return;
    }
    await doRoll(val);
  }

  async function doRoll(guess) {
    if (rolling) return;
    rolling = true;
    setDisabled(true);

    const die = document.getElementById("die");
    const result = document.getElementById("result");
    result.className = "result-banner";
    result.innerText = "";
    die.style.transform = "rotate(360deg) scale(0.85)";

    const data = await playDice(guess);
    if (data.error) {
      result.className = "result-banner lose";
      result.innerText = data.error;
      rolling = false;
      setDisabled(false);
      die.style.transform = "none";
      return;
    }

    bumpTokenBox(data.tokens);

    setTimeout(() => {
      die.style.transform = "none";
      die.innerText = data.roll;
      if (data.win) {
        result.className = "result-banner win";
        result.innerText = `Rolled ${data.roll} — you won ${data.payout} tokens!`;
      } else {
        result.className = "result-banner lose";
        result.innerText = `Rolled ${data.roll} — no win.`;
      }
      rolling = false;
      setDisabled(false);
    }, 400);
  }
</script>
</body>
</html>
