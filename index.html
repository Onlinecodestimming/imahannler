<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BipCasino</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="tokenBox">Loading…</div>

<h1>BipCasino</h1>
<p class="subtitle">Play-money arcade &middot; no real cash, ever</p>

<div class="game-list">
  <div class="game-card" onclick="location.href='games/spin.html'">
    <div class="marquee">
      <div class="game-icon">🎡</div>
      <h2>Spin Wheel</h2>
      <div class="odds">Bet 10 &middot; ~30% win &middot; 4x payout</div>
    </div>
    <div class="play-row"><button>Play</button></div>
  </div>

  <div class="game-card" onclick="location.href='games/slots.html'">
    <div class="marquee">
      <div class="game-icon">🎰</div>
      <h2>Slots</h2>
      <div class="odds">Bet 10 &middot; pairs &amp; jackpots</div>
    </div>
    <div class="play-row"><button>Play</button></div>
  </div>

  <div class="game-card" onclick="location.href='games/blackjack.html'">
    <div class="marquee">
      <div class="game-icon">🃏</div>
      <h2>Blackjack</h2>
      <div class="odds">Bet 10 &middot; beat the dealer</div>
    </div>
    <div class="play-row"><button>Play</button></div>
  </div>

  <div class="game-card" onclick="location.href='games/dice.html'">
    <div class="marquee">
      <div class="game-icon">🎲</div>
      <h2>Dice</h2>
      <div class="odds">Bet 10 &middot; over/under or exact</div>
    </div>
    <div class="play-row"><button>Play</button></div>
  </div>

  <div class="game-card" onclick="location.href='games/coinflip.html'">
    <div class="marquee">
      <div class="game-icon">🪙</div>
      <h2>Coinflip</h2>
      <div class="odds">Bet 10 &middot; 50/50 &middot; 2x payout</div>
    </div>
    <div class="play-row"><button>Play</button></div>
  </div>

  <div class="game-card" onclick="location.href='games/roulette.html'">
    <div class="marquee">
      <div class="game-icon">🎯</div>
      <h2>Roulette</h2>
      <div class="odds">Bet 10 &middot; red/black/green</div>
    </div>
    <div class="play-row"><button>Play</button></div>
  </div>
</div>

<div id="nav"></div>

<script src="/script.js"></script>
<script>
  (async () => {
    await requireLogin();
    await renderTokenBox();
    await loadNav();
  })();
</script>
</body>
</html>
